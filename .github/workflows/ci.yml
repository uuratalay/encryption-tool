name: CI

on:
  push:
    branches: [main, phase-1, phase-2, phase-3]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          cd ${{ github.workspace }}
          python -m pytest tests/ -v --tb=short
